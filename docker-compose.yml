services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: peck_deck
      POSTGRES_USER: peck_deck
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peck_deck -d peck_deck"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://peck_deck:${POSTGRES_PASSWORD:-changeme}@db:5432/peck_deck
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:

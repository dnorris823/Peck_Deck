name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt

      # Suite runs against a throwaway SQLite DB (aiosqlite) — no Postgres needed.
      - name: Run tests
        run: pytest -q

  integration:
    name: Integration + contract tests (postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: peck_deck
          POSTGRES_USER: peck_deck
          POSTGRES_PASSWORD: changeme
        ports:
          - 5432:5432
        # Wait for the DB to accept connections before the job starts.
        options: >-
          --health-cmd "pg_isready -U peck_deck -d peck_deck"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: integration_tests/requirements.txt

      - name: Install dependencies
        run: pip install -r integration_tests/requirements.txt

      # Runs the API against the real postgres:16 service and drives the Pi
      # aiohttp clients against live in-process servers (backend + inference,
      # GPU mocked). Gated on PECK_TEST_DATABASE_URL — unset, the suite no-ops.
      - name: Run integration + contract tests
        env:
          PECK_TEST_DATABASE_URL: postgresql+asyncpg://peck_deck:changeme@localhost:5432/peck_deck
          JWT_SECRET: ci-integration-secret-key-at-least-32-bytes!!
        run: pytest integration_tests/ -q

  frontend:
    name: Frontend build (vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
